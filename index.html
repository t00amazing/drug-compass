<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Drug Compass · 마음의 근육 찾기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --bg:#FFF8EC;
    --bg2:#FDEFE0;
    --ink:#2B2D42;
    --ink-soft:#5B5E73;
    --coral:#FF6B6B;
    --coral-deep:#E8534F;
    --sunshine:#FFC857;
    --mint:#4ECDC4;
    --card:#FFFFFF;
    --line:#2B2D42;
    --r-lg:26px;
    --r-md:18px;
    --r-sm:12px;
    --shadow-col:#2B2D42;
    --maxw:480px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 12% 8%, rgba(255,200,87,.35), transparent 40%),
      radial-gradient(circle at 88% 18%, rgba(78,205,196,.30), transparent 38%),
      radial-gradient(circle at 20% 92%, rgba(255,107,107,.22), transparent 42%),
      var(--bg);
    min-height:100vh;
    font-family:'Noto Sans KR', -apple-system, sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Jua','Noto Sans KR',sans-serif;}
  #app{
    width:100%;
    max-width:var(--maxw);
    min-height:100vh;
    padding:18px 16px 40px;
    position:relative;
  }
  .screen{display:none; animation:fadeUp .45s ease both;}
  .screen.active{display:block;}
  @keyframes fadeUp{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }

  /* ---------- shared sticker card ---------- */
  .sticker{
    background:var(--card);
    border:3px solid var(--line);
    border-radius:var(--r-lg);
    box-shadow:6px 6px 0 var(--shadow-col);
    position:relative;
  }
  .btn{
    font-family:'Noto Sans KR',sans-serif;
    font-weight:700;
    cursor:pointer;
    border:3px solid var(--line);
    border-radius:999px;
    background:var(--coral);
    color:#fff;
    padding:14px 28px;
    font-size:16px;
    box-shadow:5px 5px 0 var(--shadow-col);
    transition:transform .15s ease, box-shadow .15s ease, background .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:hover{transform:translate(-2px,-2px); box-shadow:7px 7px 0 var(--shadow-col); background:var(--coral-deep);}
  .btn:active{transform:translate(2px,2px); box-shadow:2px 2px 0 var(--shadow-col);}
  .btn:focus-visible{outline:3px solid var(--mint); outline-offset:2px;}
  .btn.secondary{background:#fff; color:var(--ink);}
  .btn.secondary:hover{background:var(--bg2);}

  /* ---------- intro screen ---------- */
  .logo-row{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
  .logo-row .dot{width:10px;height:10px;border-radius:50%;background:var(--coral); border:2px solid var(--line);}
  .eyebrow{
    display:inline-block; font-size:13px; font-weight:700; letter-spacing:.02em;
    background:var(--sunshine); border:2px solid var(--line); border-radius:999px;
    padding:4px 12px; color:var(--ink);
  }
  h1.title{font-size:clamp(28px,8vw,38px); margin:10px 0 2px; line-height:1.15;}
  p.subtitle{font-size:15px; color:var(--ink-soft); margin:0 0 18px; line-height:1.55;}
  .intro-card{padding:22px 20px 26px; margin-bottom:18px;}
  .char-strip{
    display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin:16px 0 4px;
  }
  .intro-kicker{
    font-size:13px; font-weight:700; color:var(--ink-soft); letter-spacing:.02em; margin:0 0 4px;
  }
  .intro-tagline{
    font-size:13px; color:var(--ink-soft); font-style:italic; margin:6px 0 18px;
  }
  .char-strip img{
    width:100%; aspect-ratio:1/1; object-fit:contain; filter:drop-shadow(2px 2px 0 rgba(43,45,66,.12));
    cursor:pointer; transition:transform .25s ease, filter .25s ease;
  }
  .char-strip img:hover{
    filter:drop-shadow(3px 5px 0 rgba(43,45,66,.18));
    animation:charWiggle .7s ease-in-out infinite;
  }
  @keyframes charWiggle{
    0%, 100%{transform:rotate(-6deg) scale(1.12);}
    50%{transform:rotate(6deg) scale(1.12);}
  }
  @media (prefers-reduced-motion: reduce){
    .char-strip img:hover{animation:none; transform:scale(1.08);}
  }
  .intro-desc{font-size:14px; line-height:1.7; color:var(--ink-soft); margin:14px 0 20px;}
  .start-btn{width:100%; text-align:center; font-size:18px; padding:16px;}
  .note-line{font-size:12.5px; color:var(--ink-soft); text-align:center; margin-top:14px;}

  /* ---------- quiz screen ---------- */
  .progress-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .progress-label{font-size:13px; font-weight:700; color:var(--ink-soft);}
  .progress-track{height:10px; border-radius:999px; background:#fff; border:2px solid var(--line); overflow:hidden; margin-bottom:18px;}
  .progress-fill{height:100%; background:linear-gradient(90deg,var(--coral),var(--sunshine)); width:0%; transition:width .4s ease;}
  .q-card{padding:24px 20px; margin-bottom:18px;}
  .q-num{
    position:absolute; top:-16px; left:18px; background:var(--ink); color:#fff;
    font-family:'Jua',sans-serif; font-size:14px; padding:4px 12px; border-radius:999px;
    border:3px solid var(--line);
  }
  .q-text{font-size:17px; font-weight:700; line-height:1.6; margin-top:6px;}
  .choices{display:flex; flex-direction:column; gap:12px;}
  .choice{
    display:flex; align-items:flex-start; gap:12px;
    background:#fff; border:3px solid var(--line); border-radius:var(--r-md);
    padding:14px 16px; box-shadow:4px 4px 0 var(--shadow-col);
    cursor:pointer; text-align:left;
    transition:transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease, background .25s ease;
    font-family:'Noto Sans KR',sans-serif;
  }
  .choice .badge{
    flex:0 0 auto; width:30px; height:30px; border-radius:50%; border:2.5px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-weight:900; font-size:14px; color:#fff;
    transition:transform .25s ease;
  }
  .choice[data-letter="a"] .badge{background:var(--mint);}
  .choice[data-letter="b"] .badge{background:var(--sunshine); color:var(--ink);}
  .choice[data-letter="c"] .badge{background:var(--coral);}
  .choice span.txt{font-size:14.5px; line-height:1.55; padding-top:3px;}
  .choice:hover{transform:translate(-3px,-3px) rotate(-0.4deg); box-shadow:7px 7px 0 var(--shadow-col);}
  .choice[data-letter="a"]:hover{background:#EAFBF9;}
  .choice[data-letter="b"]:hover{background:#FFF7E3;}
  .choice[data-letter="c"]:hover{background:#FFEDED;}
  .choice:hover .badge{transform:scale(1.15) rotate(-8deg);}
  .choice:active, .choice.selected{transform:translate(2px,2px); box-shadow:1px 1px 0 var(--shadow-col);}
  .choice.selected{animation:pop .32s ease;}
  @keyframes pop{0%{transform:scale(1);}45%{transform:scale(1.05);}100%{transform:scale(1);}}
  .choice:focus-visible{outline:3px solid var(--ink); outline-offset:2px;}

  /* ---------- result screen ---------- */
  .risk-banner{
    border-radius:var(--r-md); border:3px solid var(--line); padding:18px 18px 16px;
    margin-bottom:18px; box-shadow:5px 5px 0 var(--shadow-col); background:#fff;
  }
  .risk-banner.tier-soft{background:#FFF7E3;}
  .risk-banner.tier-mid{background:#FFE9DC;}
  .risk-banner.tier-high{background:#E9F1FB;}
  .risk-banner h3{margin:0 0 8px; font-size:16.5px; font-family:'Jua',sans-serif;}
  .risk-banner p{margin:0 0 8px; font-size:13.5px; line-height:1.7; color:var(--ink-soft);}
  .risk-banner .helpline{
    display:inline-block; margin-top:4px; font-weight:700; font-size:13.5px;
    background:var(--ink); color:#fff; padding:6px 12px; border-radius:999px;
  }

  .result-wrap{position:relative; margin-bottom:18px;}
  .result-card{
    padding:26px 22px 24px; text-align:center; overflow:hidden;
  }
  .save-btn{
    position:absolute; top:10px; right:10px; width:34px; height:34px; border-radius:50%;
    background:#fff; border:2.5px solid var(--line); display:flex; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:3px 3px 0 var(--shadow-col); transition:transform .15s ease;
    z-index:5;
  }
  .save-btn:hover{transform:translate(-1px,-1px) scale(1.06);}
  .save-btn:active{transform:translate(1px,1px);}
  .save-btn svg{width:16px;height:16px;}
  .brand-eyebrow{
    display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; letter-spacing:.04em;
    color:var(--ink-soft); margin-bottom:10px;
  }
  .brand-eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--coral);}
  .result-headline{font-size:clamp(19px,5.6vw,23px); line-height:1.4; margin:0 0 18px;}

  .avatar-row{display:flex; flex-wrap:wrap; justify-content:center; gap:18px 14px; margin-bottom:6px;}
  .avatar-item{flex:0 1 auto; width:160px; max-width:42%;}
  .avatar-row.single .avatar-item{width:auto; max-width:none;}

  .halo{
    width:100%; aspect-ratio:1/1; margin:0 auto; border-radius:50%;
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .avatar-row.single .halo{width:230px; max-width:78%;}
  .halo img{width:88%; height:88%; object-fit:contain; filter:drop-shadow(3px 5px 0 rgba(43,45,66,.18)); position:relative; z-index:2;}
  .halo::before{
    content:''; position:absolute; inset:0; border-radius:50%; z-index:1;
    background:var(--dcolor, var(--mint)); opacity:.35; filter:blur(2px);
  }
  .avatar-trait-top{margin:10px 0 0; letter-spacing:.01em;}
  .avatar-name{font-size:clamp(19px,5.6vw,24px); margin:4px 0 0; color:var(--ink);}
  .avatar-row.single .avatar-name{font-size:clamp(27px,7.6vw,33px); margin-top:6px;}
  .avatar-trait{font-size:12.5px; color:var(--ink-soft); margin:3px 0 0; font-weight:700;}
  .avatar-row.single .avatar-trait-top{font-size:13.5px; margin-bottom:0;}

  .hashtags{
    display:grid; grid-template-columns:repeat(2, max-content); gap:8px 10px;
    justify-content:center; margin:10px 0 4px;
  }
  .avatar-row:not(.single) .avatar-item .hashtags{grid-template-columns:repeat(2, max-content); gap:6px 7px; margin-top:8px;}
  .hashtag{
    font-size:13px; font-weight:700; border-radius:999px; padding:6px 13px;
    border:2px solid var(--line); background:var(--dcolor, var(--mint)); color:#fff; white-space:nowrap;
  }
  .avatar-row:not(.single) .avatar-item .hashtag{font-size:11px; padding:4px 9px;}

  .result-tagline{
    font-size:12.5px; color:var(--ink-soft); font-style:italic; margin:18px 0 0; text-align:center;
  }
  .result-advice{
    font-size:13.5px; line-height:1.75; color:var(--ink); text-align:left;
    background:var(--bg2); border-radius:var(--r-sm); padding:14px 16px; border:2px dashed var(--ink-soft);
  }

  .accordion{margin-bottom:14px;}
  .accordion-head{
    display:flex; align-items:center; justify-content:space-between; cursor:pointer;
    padding:14px 16px; font-weight:700; font-size:14px;
  }
  .accordion-head .chev{transition:transform .25s ease;}
  .accordion.open .chev{transform:rotate(180deg);}
  .accordion-body{display:none; padding:0 16px 16px;}
  .accordion.open .accordion-body{display:block;}
  .accordion.open .accordion-body.allscores{display:flex;}
  .rec-intro{font-size:13px; color:var(--ink-soft); line-height:1.6; margin:0 0 12px; padding-bottom:10px; border-bottom:1px dashed #e2ddd2;}
  .rec-item{display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-top:1px dashed #e2ddd2;}
  .rec-item:first-of-type{border-top:none;}
  .rec-item img{width:46px; height:46px; object-fit:contain; flex:0 0 auto;}
  .rec-item .rec-name{font-weight:700; font-size:13.5px; margin-bottom:2px;}
  .rec-item .rec-text{font-size:12.5px; color:var(--ink-soft); line-height:1.6;}

  .detail-section{margin-bottom:16px;}
  .detail-section:last-child{margin-bottom:0;}
  .detail-label{
    display:inline-flex; align-items:center; gap:6px; font-family:'Jua',sans-serif; font-size:14px;
    background:var(--ink); color:#fff; padding:4px 12px; border-radius:999px; margin-bottom:8px;
  }
  .detail-text{font-size:13.5px; line-height:1.75; color:var(--ink);}
  .checklist{margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:8px;}
  .checklist li{
    font-size:13px; line-height:1.6; color:var(--ink); display:flex; gap:8px; align-items:flex-start;
    background:var(--bg2); border-radius:var(--r-sm); padding:9px 12px;
  }
  .checklist li::before{content:'✔︎'; color:var(--mint); font-weight:900; flex:0 0 auto; margin-top:1px;}

  .allscores{flex-direction:column; gap:14px; padding:4px 16px 16px;}
  .allscore-row{display:flex; flex-direction:column; gap:6px; font-size:12px;}
  .allscore-top{display:flex; align-items:center; gap:8px;}
  .allscore-rank{
    flex:0 0 auto; width:20px; height:20px; border-radius:50%; background:var(--ink); color:#fff;
    font-size:11px; font-weight:900; display:flex; align-items:center; justify-content:center;
  }
  .allscore-label{
    position:relative; flex:1; min-width:0; cursor:help; display:inline-block;
    border-bottom:1.5px dotted var(--ink-soft); padding-bottom:1px;
  }
  .allscore-nm{font-weight:700; font-size:13px;}
  .allscore-trait{font-size:11.5px; color:var(--ink-soft); font-weight:700;}
  .allscore-val{flex:0 0 34px; text-align:right; font-weight:700; color:var(--ink-soft); font-size:12px;}
  .allscore-track{width:100%; height:10px; background:#F1ECE2; border-radius:999px; overflow:hidden; border:1.5px solid #e2ddd2;}
  .allscore-fill{display:block; height:100%; border-radius:999px;}

  .allscore-tooltip{
    position:absolute; left:0; top:calc(100% + 8px); z-index:20;
    width:max-content; max-width:230px; background:var(--ink); color:#fff;
    font-size:11.5px; font-weight:500; line-height:1.5; padding:9px 12px; border-radius:12px;
    opacity:0; visibility:hidden; transform:translateY(-4px); transition:opacity .15s ease, transform .15s ease;
    pointer-events:none; white-space:normal;
  }
  .allscore-tooltip::before{
    content:''; position:absolute; bottom:100%; left:14px; border:6px solid transparent;
    border-bottom-color:var(--ink);
  }
  .allscore-label:hover .allscore-tooltip,
  .allscore-label:focus .allscore-tooltip,
  .allscore-label.show-tip .allscore-tooltip{
    opacity:1; visibility:visible; transform:translateY(0);
  }

  .restart-row{display:flex; justify-content:center; margin-top:8px;}

  footer.app-footer{text-align:center; font-size:11.5px; color:#9a9486; margin-top:26px;}

  @media (max-width:380px){
    .char-strip{grid-template-columns:repeat(5,1fr);}
    .q-text{font-size:16px;}
  }
</style>
</head>
<body>
<div id="app">

  <!-- ============ INTRO ============ -->
  <section id="screen-intro" class="screen active">
    <div class="logo-row"><span class="dot"></span><span class="eyebrow display">DRUG COMPASS</span></div>
    <p class="intro-kicker">청소년 약물 예방 자가진단</p>
    <h1 class="title display">나를 안전하게 지켜줄<br>마음의 근육 진단하기</h1>
    <p class="intro-tagline">나의 건강한 선택을 찾아가는 약물 예방 성장카드</p>

    <div class="sticker intro-card">
      <div class="char-strip" id="intro-char-strip"></div>
      <p class="intro-desc" id="intro-desc">불러오는 중...</p>
      <button class="btn start-btn display" id="start-btn">시작하기 →</button>
    </div>
    <p class="note-line">정답은 없어요. 솔직하고 편안하게 답해보세요 🌿</p>
  </section>

  <!-- ============ QUIZ ============ -->
  <section id="screen-quiz" class="screen">
    <div class="progress-row">
      <span class="progress-label" id="progress-label">Q1 / 15</span>
      <span class="progress-label" id="progress-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

    <div class="sticker q-card">
      <span class="q-num display" id="q-num">Q1</span>
      <p class="q-text" id="q-text">로딩 중...</p>
      <div class="choices" id="choices"></div>
    </div>
  </section>

  <!-- ============ RESULT ============ -->
  <section id="screen-result" class="screen">
    <div id="risk-banner-slot"></div>

    <div class="result-wrap" id="result-wrap">
      <div class="sticker result-card" id="result-card-capture">
        <button class="save-btn" id="save-btn" title="카드 저장하기" aria-label="결과 카드 이미지로 저장">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 3v12m0 0l-4.5-4.5M12 15l4.5-4.5M4 18h16" stroke="#2B2D42" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span class="brand-eyebrow display"><span class="dot"></span>DRUG COMPASS</span>
        <h2 class="result-headline display" id="result-headline">-</h2>
        <div class="avatar-row" id="avatar-row"></div>
        <p class="result-tagline" id="result-tagline">나의 건강한 선택을 찾아가는 약물 예방 성장카드</p>
      </div>
    </div>

    <div class="sticker accordion" id="detail-accordion">
      <div class="accordion-head" id="detail-head">
        <span>🔍 특징 · 점검사항 · 조언</span>
        <span class="chev">▾</span>
      </div>
      <div class="accordion-body" id="detail-body"></div>
    </div>

    <div class="sticker accordion" id="rec-accordion">
      <div class="accordion-head" id="rec-head">
        <span>🤝 추천 캐릭터</span>
        <span class="chev">▾</span>
      </div>
      <div class="accordion-body" id="rec-body"></div>
    </div>

    <div class="sticker accordion" id="all-accordion">
      <div class="accordion-head" id="all-head">
        <span>📊 전체 영역 점수 보기</span>
        <span class="chev">▾</span>
      </div>
      <div class="accordion-body allscores" id="all-body"></div>
    </div>

    <div class="restart-row">
      <button class="btn secondary display" id="restart-btn">다시 해보기 ↺</button>
    </div>
  </section>

  <footer class="app-footer">Drug Compass · 마음의 근육 워크시트</footer>
</div>

<script>
/* ======================================================================
   APP_DATA — 내장된 기본(fallback) 데이터예요.
   아래 SHEET_CONFIG.sheetId를 본인 구글시트로 설정하면, 페이지를 열 때마다
   시트의 최신 내용을 우선 불러와서 사용해요. 시트를 불러오지 못하면

간에 도움을 요청하기가 훨씬 쉬워져요.", "color": "#9B6FCE", "checklist": ["도움이 필요한 친구를 봤을 때 어디로 연결해줄 수 있는지 알고 있는지 점검해보기", "\"이미 늦었다\"는 생각에 포기하고 싶었던 순간이 있었는지 떠올려보기", "상담이나 교육을 받는 게 부끄럽다고 느꼈던 적이 있는지 돌아보기"], "recIntro": "혼자 견디지 않고 손을 내밀도록 도와주는 카드들이에요."}], "riskMessages": [{"min": 0, "max": 0, "title": "", "body": ""}, {"min": 0.1, "max": 6.0, "title": "오늘 유혹에 끌렸던 순간이 있었어요", "body": "누구에게나 마음이 흔들리는 순간은 찾아오기 마련이에요. 흔들리는 그 순간에도 우리 학생 안에는 오늘 찾은 '성장카드' 속 단단한 마음의 근육이 분명히 빛나고 있었다는 걸 기억해주세요.\n가끔 마음이 휘청이는 건 절대로 스스로가 부족해서도, 그 근육이 없어져서도 아니에요. 열심히 나아가다 보면 누구나 잠시 지치고 흔들릴 수 있는 법이니까요.\n앞으로 또 흔들리는 순간이 오더라도, 이미 가지고 있는 그 마음의 근육을 언제든 다시 꺼내 쓰면 돼요. 지금처럼만 스스로를 믿고 한 걸음씩 나아가기로 해요."}, {"min": 6.1, "max": 17.0, "title": "요즘 많이 지치고 힘들었던 것 같아요", "body": "이건 결코 의지가 약해서가 아니에요. 요즘 많이 지치고 힘들다는 걸 마음이 보내는 신호일 뿐이랍니다.\n그래도 기억해 주세요. 우리 학생 안에는 오늘 찾은 '성장카드' 속 단단한 마음의 근육이 분명히 숨 쉬고 있어요. 지금 너무 많은 무게를 견디느라 잠시 힘에 부친 것뿐이에요.\n유혹이나 힘든 마음이 찾아올 땐 딱 하나만 기억해 보세요. '지금 이 마음은 영원하지 않다'는 것을요.\n그 고비를 버티는 동안 혼자 끙끙 앓지 말고 가족이나 친구, 혹은 선생님에게 마음을 나눠주세요."}, {"min": 17.1, "max": null, "title": "지금은 대표 카드보다 이 이야기를 먼저 읽어주세요", "body": "오늘은 그저 모든 걸 내려놓고 싶은 마음이 더 컸을지도 모르겠어요. 하지만 결코 우리 학생이 나약해서가 아니에요. 혼자 감당하기엔 너무 많은 일들이 어깨를 짓누르고 있다는 신호일 뿐이랍니다.\n지금은 이 테스트를 채우는 것보다 무거운 짐을 누군가에게 털어놓는 게 훨씬 더 필요해요. 학교 상담 선생님이나 신뢰하는 어른, 혹은 청소년상담복지센터(1388)에 전화나 문자로 마음을 툭 던져보세요.\n마음이 복잡하고 우울함이 밀려와도 절대 이상한 게 아니에요. 힘든 일이 한꺼번에 몰리면 누구라도 무너지고 흔들릴 수밖에 없으니까요.\n꼭 기억해 주세요, 절대 혼자가 아니에요. 그리고 지금의 힘든 시간도 영원히 계속되지는 않을 거랍니다."}]};

   구글시트 연동 설정
   - 구글시트를 "링크가 있는 모든 사용자 → 뷰어"로 공유한 뒤, 시트 ID를 적어주세요.
     (시트 URL의 /d/ 와 /edit 사이 문자열)
   - 탭 이름은 시트에서 실제로 쓰는 탭(시트) 이름과 정확히 같아야 해요.
   - sheetId를 비워두거나 기본값 그대로 두면, 시트 연동 없이 내장 데이터로만 동작해요.
   ====================================================================== */
const SHEET_CONFIG = {
  sheetId: '1kh9Uu3dcPpWDWu27j7tbwGcCwxhPW8ECLrp7Xs3zv8g',
  tabs: { questions: 'Questions', domains: 'Domains', riskMessages: 'RiskMessages' }
};

/* ====================== STATE ====================== */
const state = { data:null, idx:0, answers:{} };

/* ====================== LOAD DATA (구글시트 우선, 실패 시 내장 데이터로 대체) ====================== */
async function loadData(){
  const configured = SHEET_CONFIG.sheetId && SHEET_CONFIG.sheetId !== 'YOUR_GOOGLE_SHEET_ID_HERE';
  if (configured){
    try {
      const [qCsv, dCsv, rCsv] = await Promise.all([
        fetchCsv(SHEET_CONFIG.tabs.questions),
        fetchCsv(SHEET_CONFIG.tabs.domains),
        fetchCsv(SHEET_CONFIG.tabs.riskMessages)
      ]);
      const liveData = buildAppDataFromSheets(parseCSV(qCsv), parseCSV(dCsv), parseCSV(rCsv));
      onDataLoaded(liveData);
      return;
    } catch (err){
      console.warn('[Drug Compass] 구글시트를 불러오지 못해 내장 데이터로 진행합니다:', err);
    }
  }
  onDataLoaded(APP_DATA);
}

function sheetCsvUrl(tabName){
  return 'https://docs.google.com/spreadsheets/d/' + SHEET_CONFIG.sheetId +
    '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(tabName) + '&_=' + Date.now();
}

function fetchCsv(tabName){
  const TIMEOUT_MS = 7000;
  return Promise.race([
    fetch(sheetCsvUrl(tabName)).then(r=>{
      if (!r.ok) throw new Error('시트 응답 오류 (' + tabName + '): HTTP ' + r.status);
      return r.text();
    }),
    new Promise((_, rej)=>setTimeout(()=>rej(new Error('시트 응답 시간 초과 (' + tabName + ')')), TIMEOUT_MS))
  ]);
}

// 간단한 CSV 파서 (쌍따옴표로 감싼 줄바꿈/쉼표/이스케이프 따옴표까지 처리)
function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i=0; i<text.length; i++){
    const c = text[i];
    if (inQuotes){
      if (c === '"'){
        if (text[i+1] === '"'){ field += '"'; i++; }
        else { inQuotes = false; }
      } else {
        field += c;
      }
    } else if (c === '"'){
      inQuotes = true;
    } else if (c === ','){
      row.push(field); field = '';
    } else if (c === '\n'){
      row.push(field); rows.push(row); row = []; field = '';
    } else if (c === '\r'){
      // skip, \n 에서 줄바꿈 처리
    } else {
      field += c;
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.some(v => String(v).trim() !== ''));
}

function rowsToObjects(rows){
  if (!rows || !rows.length) return [];
  const header = rows[0].map(h=>String(h).trim());
  return rows.slice(1)
    .filter(r => r[0] !== undefined && String(r[0]).trim() !== '')
    .map(r=>{
      const o = {};
      header.forEach((h,i)=>{ o[h] = r[i] !== undefined ? r[i] : ''; });
      return o;
    });
}

function buildAppDataFromSheets(qRows, dRows, rRows){
  const questions = rowsToObjects(qRows).map(r=>({
    id: String(r.id).trim(),
    text: r.text, aText: r.aText, aDomain: String(r.aDomain).trim(),
    bText: r.bText, bDomain: String(r.bDomain).trim(), cText: r.cText,
    weight: Number(r.weight)
  }));
  const domains = rowsToObjects(dRows).map(r=>({
    id: String(r.id).trim(), animal: r.animal, trait: r.trait,
    feature: r.feature, advice: r.advice,
    hashtags: String(r.hashtags||'').split(',').map(s=>s.trim()).filter(Boolean),
    checklist: String(r.checklist||'').split('|').map(s=>s.trim()).filter(Boolean),
    recIntro: r.recIntro || '',
    rec1Name: String(r.rec1Name||'').trim(), rec1Text: r.rec1Text || '',
    rec2Name: String(r.rec2Name||'').trim(), rec2Text: r.rec2Text || '',
    color: String(r.color||'#999999').trim()
  }));
  const riskMessages = rowsToObjects(rRows).map(r=>({
    min: Number(r.min),
    max: (r.max === '' || r.max === undefined || r.max === null) ? null : Number(r.max),
    title: r.title || '', body: r.body || ''
  })).sort((a,b)=>a.min-b.min);

  if (!questions.length || !domains.length || !riskMessages.length){
    throw new Error('시트에서 읽은 데이터가 비어 있거나 형식이 올바르지 않습니다.');
  }
  return { questions, domains, riskMessages };
}

function onDataLoaded(data){
  state.data = data;
  renderIntro();
}

/* ====================== INTRO ====================== */
function renderIntro(){
  const strip = document.getElementById('intro-char-strip');
  strip.innerHTML = '';
  state.data.domains.forEach(d=>{
    const img = document.createElement('img');
    img.src = CHAR_ICONS[d.id] || '';
    img.alt = d.id;
    strip.appendChild(img);
  });
  document.getElementById('intro-desc').textContent =
    '운동을 하면 몸의 근육이 생기듯, 해로운 중독과 약물 오남용의 유혹으로부터 나를 안전하게 지켜주는 마음의 근육은 누구에게나 있어요. 순간의 흔들림 속에서도 나를 조절할 수 있는 내 안의 단단한 마음 근육을 함께 찾아보아요.';
}
document.getElementById('start-btn').addEventListener('click', startQuiz);

/* ====================== QUIZ ====================== */
function startQuiz(){
  state.idx = 0; state.answers = {};
  show('screen-quiz');
  renderQuestion();
}
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}
function renderQuestion(){
  const q = state.data.questions[state.idx];
  const total = state.data.questions.length;
  document.getElementById('progress-label').textContent = 'Q' + (state.idx+1) + ' / ' + total;
  document.getElementById('progress-pct').textContent = Math.round((state.idx)/total*100) + '%';
  document.getElementById('progress-fill').style.width = (state.idx/total*100) + '%';
  document.getElementById('q-num').textContent = 'Q' + (state.idx+1);
  document.getElementById('q-text').textContent = q.text;

  const wrap = document.getElementById('choices');
  wrap.innerHTML = '';
  [['a',q.aText],['b',q.bText],['c',q.cText]].forEach(([letter,txt])=>{
    const el = document.createElement('button');
    el.className = 'choice';
    el.setAttribute('data-letter', letter);
    el.innerHTML = '<span class="badge">' + letter.toUpperCase() + '</span><span class="txt"></span>';
    el.querySelector('.txt').textContent = txt;
    el.addEventListener('click', ()=>selectAnswer(letter, el));
    wrap.appendChild(el);
  });
}
function selectAnswer(letter, el){
  document.querySelectorAll('.choice').forEach(c=>c.style.pointerEvents='none');
  el.classList.add('selected');
  state.answers[state.data.questions[state.idx].id] = letter;
  setTimeout(()=>{
    state.idx++;
    if (state.idx >= state.data.questions.length){
      finishQuiz();
    } else {
      renderQuestion();
    }
  }, 360);
}

/* ====================== SCORING ====================== */
function tierOf(weight){ return weight >= 3 ? 3 : (weight >= 2 ? 2 : 1); }

function computeResult(){
  const questions = state.data.questions;
  const domains = state.data.domains;
  const domainIds = domains.map(d=>d.id);

  const scores = {}; domainIds.forEach(id=>scores[id]=0);
  let riskScore = 0;

  // build theoretical components per domain (for tie-break), from ALL questions structurally
  const components = {}; domainIds.forEach(id=>components[id]=[]);
  questions.forEach(q=>{
    components[q.aDomain].push(q.weight);
    components[q.bDomain].push(q.weight);
  });

  questions.forEach(q=>{
    const choice = state.answers[q.id];
    if (choice === 'c'){ riskScore += q.weight; }
    else if (choice === 'a'){ scores[q.aDomain] += q.weight; }
    else if (choice === 'b'){ scores[q.bDomain] += q.weight; }
  });

  const maxScore = Math.max(...domainIds.map(id=>scores[id]));
  let representative = null;
  let tieCount = 0;
  if (maxScore > 1e-9){
    tieCount = domainIds.filter(id => Math.abs(scores[id]-maxScore) < 0.005).length;
    representative = resolveTie(scores, components, domainIds, maxScore);
  }

  const riskMsg = pickRiskMessage(riskScore);

  return { scores, riskScore, representative, tieCount, riskMsg, components };
}

/**
 * 최고점 영역이 정확히 1개로 좁혀질 때까지 단계적으로 추려 하나의 대표 영역을 반환합니다.
 * (채점/동점 처리 로직 — 이전과 동일하게 유지)
 * ① 점수가 같은 영역들 중 → ② 더 위험한 등급의 구성 문항을 가진 영역 → ③ 가중치 구성 비교
 * → ④ 이론적 최대 점수가 큰 영역 순으로 좁혀 최종 1개를 결정합니다.
 */
function resolveTie(scores, components, domainOrder, maxScore){
  const EPS = 0.005;
  let candidates = domainOrder.filter(id => Math.abs(scores[id]-maxScore) < EPS);
  if (candidates.length === 1) return candidates[0];

  // step2: highest tier among components
  const highestTier = id => Math.max(...components[id].map(tierOf));
  const maxTier = Math.max(...candidates.map(highestTier));
  candidates = candidates.filter(id => highestTier(id) === maxTier);
  if (candidates.length === 1) return candidates[0];

  // step3: lexicographic compare of sorted-desc component weights
  const sortedDesc = id => [...components[id]].sort((a,b)=>b-a);
  candidates.sort((a,b)=>{
    const A = sortedDesc(a), B = sortedDesc(b);
    for (let i=0;i<Math.max(A.length,B.length);i++){
      const av = A[i] ?? -Infinity, bv = B[i] ?? -Infinity;
      if (Math.abs(av-bv) > EPS) return bv-av;
    }
    return 0;
  });
  const top = sortedDesc(candidates[0]);
  candidates = candidates.filter(id=>{
    const c = sortedDesc(id);
    return c.every((v,i)=>Math.abs(v-top[i])<EPS) && c.length===top.length;
  });
  if (candidates.length === 1) return candidates[0];

  // step4: final safety net - domain with the larger theoretical max score wins
  const theoreticalMax = id => components[id].reduce((s,w)=>s+w, 0);
  candidates.sort((a,b)=> (theoreticalMax(b)-theoreticalMax(a)) || a.localeCompare(b));
  return candidates[0];
}

function pickRiskMessage(score){
  const msgs = state.data.riskMessages;
  for (const m of msgs){
    const max = (m.max === null || m.max === '' || m.max === undefined) ? Infinity : m.max;
    if (score >= m.min - 1e-9 && score <= max + 1e-9){
      return Object.assign({score}, m);
    }
  }
  return null;
}

/* ====================== RESULT RENDER ====================== */
function finishQuiz(){
  const result = computeResult();
  renderResult(result);
  show('screen-result');
}

function renderResult(result){
  renderRiskBanner(result.riskMsg);

  const resultWrap = document.getElementById('result-wrap');
  const recAcc = document.getElementById('rec-accordion');
  const detailAcc = document.getElementById('detail-accordion');
  if (!result.representative){
    resultWrap.style.display = 'none';
    recAcc.style.display = 'none';
    detailAcc.style.display = 'none';
  } else {
    resultWrap.style.display = '';
    recAcc.style.display = '';
    detailAcc.style.display = '';
    const d = state.data.domains.find(x=>x.id === result.representative);
    renderCard(d, result.tieCount);
    renderDetail(d);
    renderRecommend(d);
  }
  renderAllScores(result.scores);
}

function renderRiskBanner(msg){
  const slot = document.getElementById('risk-banner-slot');
  slot.innerHTML = '';
  if (!msg || !msg.title) return;
  const tierClass = msg.max <= 6.0 ? 'tier-soft' : (msg.max <= 17.0 ? 'tier-mid' : 'tier-high');
  const div = document.createElement('div');
  div.className = 'risk-banner ' + tierClass;
  const bodyHtml = msg.body.split('\n').filter(Boolean).map(p=>'<p>'+p+'</p>').join('');
  div.innerHTML = '<h3 class="display">' + msg.title + '</h3>' + bodyHtml +
    '<span class="helpline">청소년상담복지센터 1388 (전화·문자)</span>';
  slot.appendChild(div);
}

function renderCard(d, tieCount){
  // 헤드라인: 동점인 영역이 2개 이상이면 "오늘은 N가지 마음의 근육이 함께 빛났어요",
  // 동점이 없으면 기존 그대로 "오늘의 대표 성장카드" (대표로 뽑힌 영역 자체는 항상 1개, 변경 없음)
  const headline = document.getElementById('result-headline');
  if (tieCount && tieCount >= 2){
    headline.textContent = '오늘은 ' + numToKorCount(tieCount) + ' 마음의 근육이 함께 빛났어요';
  } else {
    headline.textContent = '오늘의 빛나는 대표 성장 근육';
  }

  document.documentElement.style.setProperty('--dcolor', d.color);

  const row = document.getElementById('avatar-row');
  row.className = 'avatar-row single';
  row.innerHTML =
    '<div class="avatar-item" style="--dcolor:' + d.color + '">' +
      '<div class="halo"><img src="' + (CHAR_ICONS[d.id]||'') + '" alt="' + d.id + '"></div>' +
      '<p class="avatar-trait avatar-trait-top">' + d.id + '</p>' +
      '<h3 class="avatar-name display">' + d.trait + '</h3>' +
      '<div class="hashtags"></div>' +
    '</div>';

  const tagWrap = row.querySelector('.hashtags');
  (d.hashtags||[]).forEach(tag=>{
    const span = document.createElement('span');
    span.className = 'hashtag';
    span.style.setProperty('--dcolor', d.color);
    span.textContent = '#' + tag;
    tagWrap.appendChild(span);
  });
}

// 동점 개수를 자연스러운 한국어 표현으로 ("2"->"두 가지", "3"->"세 가지" ...)
function numToKorCount(n){
  const words = ['','한','두','세','네','다섯','여섯','일곱','여덟','아홉','열'];
  return (words[n] || n) + ' 가지';
}

function renderDetail(d){
  const body = document.getElementById('detail-body');
  body.innerHTML = '';

  const mk = (label, innerEl) => {
    const sec = document.createElement('div');
    sec.className = 'detail-section';
    const lab = document.createElement('span');
    lab.className = 'detail-label display';
    lab.textContent = label;
    sec.appendChild(lab);
    sec.appendChild(innerEl);
    return sec;
  };

  const featureP = document.createElement('p');
  featureP.className = 'detail-text';
  featureP.textContent = d.feature;
  body.appendChild(mk('특징', featureP));

  const ul = document.createElement('ul');
  ul.className = 'checklist';
  (d.checklist||[]).forEach(item=>{
    const li = document.createElement('li');
    li.textContent = item;
    ul.appendChild(li);
  });
  body.appendChild(mk('점검사항', ul));

  const adviceP = document.createElement('p');
  adviceP.className = 'detail-text';
  adviceP.textContent = d.advice;
  body.appendChild(mk('조언', adviceP));
}

function renderRecommend(d){
  const body = document.getElementById('rec-body');
  body.innerHTML = '';
  if (d.recIntro){
    const intro = document.createElement('p');
    intro.className = 'rec-intro';
    intro.textContent = d.recIntro;
    body.appendChild(intro);
  }
  [[d.rec1Name,d.rec1Text],[d.rec2Name,d.rec2Text]].forEach(([name,text])=>{
    if (!name) return;
    const row = document.createElement('div');
    row.className = 'rec-item';
    const rd = state.data.domains.find(x=>x.id===name);
    const iconSrc = rd ? (CHAR_ICONS[rd.id]||'') : '';
    row.innerHTML = '<img src="'+iconSrc+'" alt="'+name+'">' +
      '<div><div class="rec-name">'+name+'</div><div class="rec-text"></div></div>';
    row.querySelector('.rec-text').textContent = text;
    body.appendChild(row);
  });
}

function firstSentence(text){
  if (!text) return '';
  const idx = text.indexOf('. ');
  return idx === -1 ? text : text.slice(0, idx+1);
}

function renderAllScores(scores){
  const body = document.getElementById('all-body');
  body.innerHTML = '';
  const sorted = [...state.data.domains].sort((a,b)=>scores[b.id]-scores[a.id]);

  // 점수가 0보다 큰 영역 중 "상위 3개 순위"(동점 포함)만 추려서 보여줍니다.
  const EPS = 0.005;
  const positiveValues = sorted.map(d=>scores[d.id]).filter(s=>s > EPS);
  const distinctDesc = [];
  positiveValues.forEach(v=>{
    if (!distinctDesc.some(x=>Math.abs(x-v)<EPS)) distinctDesc.push(v);
  });
  distinctDesc.sort((a,b)=>b-a);
  const topValues = distinctDesc.slice(0,3);
  const display = sorted.filter(d => topValues.some(v=>Math.abs(scores[d.id]-v)<EPS));

  if (!display.length){
    body.innerHTML = '<p style="font-size:12.5px; color:var(--ink-soft); padding:4px 0;">아직 점수가 없어요.</p>';
    return;
  }

  const maxPossible = Math.max(...topValues, 1);

  display.forEach(d=>{
    const rank = topValues.findIndex(v=>Math.abs(scores[d.id]-v)<EPS) + 1;
    const row = document.createElement('div');
    row.className = 'allscore-row';
    const pct = Math.min(100, (scores[d.id] / Math.max(maxPossible,0.0001)) * 100);
    row.innerHTML =
      '<div class="allscore-top">' +
        '<span class="allscore-rank">' + rank + '</span>' +
        '<span class="allscore-label" tabindex="0">' +
          '<span class="allscore-nm">' + d.id + '</span>' +
          '<span class="allscore-trait"> · ' + d.trait + '</span>' +
          '<span class="allscore-tooltip">' + firstSentence(d.feature) + '</span>' +
        '</span>' +
        '<span class="allscore-val">' + scores[d.id].toFixed(1) + '</span>' +
      '</div>' +
      '<span class="allscore-track"><span class="allscore-fill" style="width:'+pct+'%; background:'+d.color+'"></span></span>';
    body.appendChild(row);
  });

  // 모바일(터치) 환경에서도 탭으로 팝업을 열고 닫을 수 있도록 처리
  body.querySelectorAll('.allscore-label').forEach(label=>{
    label.addEventListener('click', (e)=>{
      e.stopPropagation();
      const wasOpen = label.classList.contains('show-tip');
      body.querySelectorAll('.allscore-label').forEach(l=>l.classList.remove('show-tip'));
      if (!wasOpen) label.classList.add('show-tip');
    });
  });
}
document.addEventListener('click', ()=>{
  document.querySelectorAll('.allscore-label.show-tip').forEach(l=>l.classList.remove('show-tip'));
});

/* ====================== ACCORDIONS ====================== */
document.getElementById('detail-head').addEventListener('click', ()=>{
  document.getElementById('detail-accordion').classList.toggle('open');
});
document.getElementById('rec-head').addEventListener('click', ()=>{
  document.getElementById('rec-accordion').classList.toggle('open');
});
document.getElementById('all-head').addEventListener('click', ()=>{
  document.getElementById('all-accordion').classList.toggle('open');
});

/* ====================== SAVE CARD AS IMAGE ====================== */
document.getElementById('save-btn').addEventListener('click', function(){
  const btn = this;
  if (typeof html2canvas !== 'function'){
    alert('카드 저장 기능을 불러오지 못했어요. 인터넷 연결을 확인하고 다시 시도해주세요.');
    return;
  }
  const target = document.getElementById('result-card-capture');
  btn.style.visibility = 'hidden';
  html2canvas(target, {scale:2, backgroundColor:'#FFF8EC'}).then(canvas=>{
    btn.style.visibility = 'visible';
    const link = document.createElement('a');
    link.download = 'drug-compass-card.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(()=>{
    btn.style.visibility = 'visible';
    alert('카드를 저장하는 중 문제가 생겼어요. 다시 시도해주세요.');
  });
});

/* ====================== RESTART ====================== */
document.getElementById('restart-btn').addEventListener('click', ()=>{
  show('screen-intro');
});

/* ====================== INIT ====================== */
loadData();
</script>
